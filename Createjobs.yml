name: CI Pipeline

on:
 push:
  branches:
    - main
    - develop
 pull_request:
   branches:
    - main

 jobs:
   build:
     runs-on: ubuntu-latest

     steps:
       - name: Checkout Repository
       - uses: actions/checkout@v4

       - name: Setup Node.js
       - uses: actions/setup-node@v4
       with:
         node-version: '18'

     - name: Install Dependies
       run: npm install

     - name: Run Tests
       run: npm test

     - name: Build Project
       run: npm run build
       
